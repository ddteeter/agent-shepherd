version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development
        patterns:
          - '*'
        exclude-patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'vitest'
          - '@vitest/*'
          - 'vite'
          - '@vitejs/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - '@tailwindcss/vite'
    open-pull-requests-limit: 10
